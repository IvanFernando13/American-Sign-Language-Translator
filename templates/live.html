<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Live Interpreter - Mirror Mode</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        /* Mirroring the displays */
        #webcam, #ui-canvas {
            transform: scaleX(-1);
            -webkit-transform: scaleX(-1);
        }
        .video-wrapper { position: relative; width: 640px; height: 480px; }
        #ui-canvas { position: absolute; top: 0; left: 0; pointer-events: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Live ASL Mode</h1>
        <div class="video-wrapper">
            <video id="webcam" autoplay playsinline width="640" height="480"></video>
            <canvas id="ui-canvas" width="640" height="480"></canvas>
        </div>
        
        <div id="result-box">
            Prediction: <span id="prediction">Waiting for hand...</span>
        </div>
        
        <a href="/" class="back-btn">← Back to Menu</a>
    </div>

    <script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('ui-canvas');
        const ctx = canvas.getContext('2d');
        const predText = document.getElementById('prediction');

        // Start Mirror Webcam
        navigator.mediaDevices.getUserMedia({ video: true })
            .then(stream => { video.srcObject = stream; })
            .catch(err => console.error("Webcam error:", err));

        // Process frame every 200ms for smoothness
        setInterval(() => {
            // Create a temporary canvas to capture the image
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = 640;
            tempCanvas.height = 480;
            const tempCtx = tempCanvas.getContext('2d');
            tempCtx.drawImage(video, 0, 0, 640, 480);
            
            const base64Image = tempCanvas.toDataURL('image/jpeg');

            fetch('/predict', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ image: base64Image })
            })
            .then(res => res.json())
            .then(data => {
                predText.innerText = data.prediction;
                
                // Clear the previous box
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                // Draw the new "Watching" box
                if (data.box) {
                    ctx.strokeStyle = "#FF9800"; // Orange
                    ctx.lineWidth = 4;
                    ctx.strokeRect(data.box.x, data.box.y, data.box.w, data.box.h);
                }
            });
        }, 200);
    </script>
</body>
</html>
