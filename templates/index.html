<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ASL Translator</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        :root {
            --bg:        #1a1714;
            --surface:   #252118;
            --card:      #2e2820;
            --border:    #3d3628;
            --accent:    #c9a96e;
            --accent-dim:#7a6340;
            --green:     #4ecca3;
            --text:      #f0ebe3;
            --text-dim:  #8a7f72;
            --text-muted:#4a4238;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            font-family: 'Inter', system-ui, sans-serif;
            height: 100vh;
            display: grid;
            grid-template-columns: 1fr 420px;
            grid-template-rows: 1fr 1fr;
            gap: 16px;
            padding: 16px;
            overflow: hidden;
        }

        .camera-section {
            grid-column: 1 / 2;
            grid-row: 1 / 3;
            background: var(--surface);
            border-radius: 20px;
            overflow: hidden;
            position: relative;
            border: 1px solid var(--border);
        }

        .camera-section video { display: none; }

        .camera-section canvas {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
            display: block;
        }

        .camera-section::before,
        .camera-section::after {
            content: '';
            position: absolute;
            width: 28px;
            height: 28px;
            z-index: 5;
            pointer-events: none;
        }
        .camera-section::before {
            top: 14px; left: 14px;
            border-top: 2px solid var(--accent);
            border-left: 2px solid var(--accent);
            border-radius: 4px 0 0 0;
        }
        .camera-section::after {
            bottom: 14px; right: 14px;
            border-bottom: 2px solid var(--accent);
            border-right: 2px solid var(--accent);
            border-radius: 0 0 4px 0;
        }

        .camera-topbar {
            position: absolute;
            top: 14px; left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(26, 23, 20, 0.75);
            backdrop-filter: blur(8px);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 6px 16px;
            z-index: 10;
        }

        .rec-dot {
            width: 8px; height: 8px;
            background: #e74c4c;
            border-radius: 50%;
            animation: pulse-red 1.5s ease-in-out infinite;
        }

        @keyframes pulse-red {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0.3; }
        }

        .camera-topbar span {
            font-size: 0.72rem;
            font-weight: 500;
            letter-spacing: 0.08em;
            color: var(--text-dim);
            text-transform: uppercase;
        }

        #stat-overlay {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        .detected-label {
            font-size: 0.65rem;
            font-weight: 600;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        .detected-value {
            background: rgba(26, 23, 20, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 10px 28px;
            font-size: 2.2rem;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: 0.04em;
            min-width: 80px;
            text-align: center;
            transition: color 0.2s;
        }

        .detected-value.active {
            color: var(--green);
            border-color: var(--green);
            box-shadow: 0 0 20px rgba(78, 204, 163, 0.2);
        }

        .reference-section,
        .editor-section {
            background: var(--card);
            border-radius: 20px;
            border: 1px solid var(--border);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .panel-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 14px 18px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .panel-icon {
            width: 28px; height: 28px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
        }

        .panel-title {
            font-size: 0.78rem;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--text-dim);
        }

        .reference-section {
            grid-column: 2 / 3;
            grid-row: 1 / 2;
        }

        .reference-body {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            position: relative;
            overflow: hidden;
            background: #ffffff; /* Fills the empty space with white to match the poster */
        }

        .reference-body img {
            width: 100%;
            height: 100%;
            object-fit: contain; /* Ensures the entire image is visible without cropping */
            object-position: center;
        }

        .editor-section {
            grid-column: 2 / 3;
            grid-row: 2 / 3;
        }

        .editor-body {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 14px;
            gap: 10px;
            min-height: 0;
        }

        textarea {
            flex: 1;
            width: 100%;
            padding: 14px 16px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: var(--surface);
            font-family: 'Inter', system-ui, sans-serif;
            font-size: 1.6rem;
            font-weight: 500;
            color: var(--text);
            resize: none;
            outline: none;
            transition: border-color 0.2s;
            line-height: 1.4;
        }

        textarea::placeholder {
            color: var(--text-muted);
            font-weight: 400;
            font-size: 1rem;
        }

        textarea:focus {
            border-color: var(--accent-dim);
        }

        .progress-row {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }

        .progress-label {
            font-size: 0.65rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--text-muted);
            white-space: nowrap;
        }

        .prog-bg {
            flex: 1;
            height: 5px;
            background: var(--border);
            border-radius: 10px;
            overflow: hidden;
        }

        #bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, var(--accent-dim), var(--accent));
            border-radius: 10px;
            transition: width 0.08s ease-out;
        }

        .editor-actions {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            flex-shrink: 0;
            padding: 0 2px;
        }

        .btn-clear {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text-dim);
            font-family: inherit;
            font-size: 0.72rem;
            font-weight: 500;
            padding: 6px 14px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.15s;
            letter-spacing: 0.04em;
        }

        .btn-clear:hover {
            background: var(--border);
            color: var(--text);
        }
    </style>
</head>
<body>

    <div class="camera-section">
        <video id="v" autoplay playsinline></video>
        <canvas id="c"></canvas>

        <div class="camera-topbar">
            <div class="rec-dot"></div>
            <span>Live Camera</span>
        </div>

        <div id="stat-overlay">
            <span class="detected-label">Detected</span>
            <div class="detected-value" id="det-val">—</div>
        </div>
    </div>

    <div class="reference-section">
        <div class="panel-header">
            <span class="panel-title">American Sign Language Alphabet</span>
        </div>
        <div class="reference-body">
            <img src="{{ url_for('static', filename='poster.png') }}" alt="ASL Alphabet Poster">
        </div>
    </div>

    <div class="editor-section">
        <div class="editor-body">
            <textarea id="e" placeholder="Hold a sign inside the camera frame to type..."></textarea>
            <div class="editor-actions">
                <button class="btn-clear" onclick="document.getElementById('e').value=''">Clear</button>
            </div>
            <div class="progress-row">
                <span class="progress-label">Hold</span>
                <div class="prog-bg"><div id="bar"></div></div>
            </div>
        </div>
    </div>

    <script>
        const v = document.getElementById('v');
        const c = document.getElementById('c');
        const ctx = c.getContext('2d');
        const e = document.getElementById('e');
        const bar = document.getElementById('bar');
        const detVal = document.getElementById('det-val');
        const cameraSection = document.querySelector('.camera-section');

        let last = "", count = 0;
        let smoothedBox = null;
        const SMOOTHING_FACTOR = 0.2;
        let missingFrames = 0;
        const MAX_MISSING_FRAMES = 5;

        navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } })
            .then(s => v.srcObject = s);

        setInterval(() => {
            if (v.videoWidth === 0) return;

            c.width  = cameraSection.clientWidth;
            c.height = cameraSection.clientHeight;
            ctx.drawImage(v, 0, 0, c.width, c.height);

            const tmp = document.createElement('canvas');
            tmp.width = 640; tmp.height = 480;
            tmp.getContext('2d').drawImage(v, 0, 0, 640, 480);

            fetch('/predict', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ image: tmp.toDataURL('image/jpeg') })
            })
            .then(r => r.json())
            .then(d => {
                
                if (d.prediction !== "None" && d.prediction === last) {
                    count++;
                } else {
                    count = 0;
                    last = d.prediction;
                }
                
                if (d.prediction !== "None") {
                    const label = d.prediction === "space" ? "␣" : d.prediction === "del" ? "⌫" : d.prediction.toUpperCase();
                    detVal.textContent = label;
                    detVal.classList.add('active');
                } else {
                    detVal.classList.remove('active');
                }

                bar.style.width = (count / 12) * 100 + "%";

                if (count >= 12) {
                    if      (d.prediction === "space") e.value += " ";
                    else if (d.prediction === "del")   e.value = e.value.slice(0, -1);
                    else if (d.prediction.length === 1) e.value += d.prediction;
                    count = 0;
                }
                
                if (d.box) {
                    missingFrames = 0;
                    if (!smoothedBox) {
                        smoothedBox = { ...d.box };
                    } else {
                        smoothedBox.x += (d.box.x - smoothedBox.x) * SMOOTHING_FACTOR;
                        smoothedBox.y += (d.box.y - smoothedBox.y) * SMOOTHING_FACTOR;
                        smoothedBox.w += (d.box.w - smoothedBox.w) * SMOOTHING_FACTOR;
                        smoothedBox.h += (d.box.h - smoothedBox.h) * SMOOTHING_FACTOR;
                    }
                } else {
                    missingFrames++;
                    if (missingFrames >= MAX_MISSING_FRAMES) {
                        smoothedBox = null;
                        detVal.textContent = "—";
                        detVal.classList.remove('active');
                    }
                }

                if (smoothedBox) {
                    const scaleX = c.width  / 640;
                    const scaleY = c.height / 480;
                    const x = smoothedBox.x * scaleX;
                    const y = smoothedBox.y * scaleY;
                    const w = smoothedBox.w * scaleX;
                    const h = smoothedBox.h * scaleY;
                    const cs = 18; 
                    
                    ctx.strokeStyle = "#4ecca3";
                    ctx.lineWidth = 3;
                    ctx.lineCap = "round";

                    const corners = [
                        [x,   y,   1,  1],
                        [x+w, y,  -1,  1],
                        [x,   y+h, 1, -1],
                        [x+w, y+h,-1, -1],
                    ];
                    ctx.beginPath();
                    corners.forEach(([cx, cy, dx, dy]) => {
                        ctx.moveTo(cx + dx * cs, cy);
                        ctx.lineTo(cx, cy);
                        ctx.lineTo(cx, cy + dy * cs);
                    });
                    ctx.stroke();
                }
            })
            .catch(err => console.error("API Error", err));
        }, 180);
    </script>
</body>
</html>
